<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KF Style Board</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

</head>
<body class="bg-gray-50 text-gray-900 antialiased">
  <div id="root"></div>

  <!-- React Application Source -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Inline SVG Icons to prevent broken CDN resources ---
    const ImageIcon = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
    );
    const CheckCircle = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    );
    const LayoutGrid = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
    );
    const Send = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    );
    const Shield = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 9.7a1 1 0 0 1-.68 0C7.5 20.5 4 18 4 13V6a1 1 0 0 1 .76-.97l8-2a1 1 0 0 1 .48 0l8 2A1 1 0 0 1 20 6z"/></svg>
    );
    const Loader = ({ className }) => (
      <svg className={`${className} animate-spin`} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="2" y2="6"/><line x1="12" x2="12" y1="18" y2="22"/><line x1="4.93" x2="7.76" y1="4.93" y2="7.76"/><line x1="16.24" x2="19.07" y1="16.24" y2="19.07"/><line x1="2" x2="6" y1="12" y2="12"/><line x1="18" x2="22" y1="12" y2="12"/><line x1="4.93" x2="7.76" y1="19.07" y2="16.24"/><line x1="16.24" x2="19.07" y1="7.76" y2="4.93"/></svg>
    );
    const Database = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/></svg>
    );
    const Save = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    );
    const AlertCircle = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
    );
    const Download = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
    );
    const Sparkles = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275Z"/><path d="m5 3 1 2.5L8.5 6 6 7 5 9.5 4 7 1.5 6 4 5Z"/><path d="m19 17 1 2.5 2.5.5-2.5 1-1 2.5-1-2.5-2.5-1 2.5-1Z"/></svg>
    );
    const SearchCheck = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/><path d="m16 9-4.5 4.5L9 11"/></svg>
    );
    const FileSpreadsheet = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M8 13h8"/><path d="M8 17h8"/><path d="M10 9h2"/></svg>
    );
    const Trash2 = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
    );
    const Plus = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
    );
    const FileText = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
    );
    const LinkIcon = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
    );
    const ArrowRight = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    );

    // --- 1. FIREBASE CONFIGURATION & INITIALIZATION ---
    let db = null;
    let auth = null;
    let isFirebaseActive = false;
    let appId = 'default-app-id';

    const rawConfig = `{"apiKey":"","authDomain":"default-app-id.firebaseapp.com","projectId":"default-app-id","storageBucket":"default-app-id.appspot.com","messagingSenderId":"123456","appId":"1:123456:web:123456"}`;
    const rawAppId = "default-app-id";

    try {
      if (rawConfig) {
        const config = JSON.parse(rawConfig);
        if (config.apiKey) {
          firebase.initializeApp(config);
          db = firebase.firestore();
          auth = firebase.auth();
          appId = rawAppId || 'default-app-id';
          isFirebaseActive = true;
        }
      }
    } catch (error) {
      console.warn("Running in sandbox local mode. Database updates will apply temporarily inside memory.");
    }

    const DEFAULT_CATALOGS = [
      {
        id: "demo-file-1",
        name: "KF 80Days Demo",
        items: [
          { code: "0102042321306", name: "BUTTON FLY SKINNY JEAN-23213006", price: "8990.0", qty: "600.0", category: "DENIM", image: "" },
          { code: "0102022520550", name: "COUTURE CURVE DENIM DRESS-25205500", price: "10900.0", qty: "527.0", category: "DENIM DRESSES", image: "" }
        ]
      }
    ];

    function parseCSV(str) {
      const arr = [];
      let quote = false;
      let col = 0, row = 0;
      for (let c = 0; c < str.length; c++) {
        let cc = str[c], nc = str[c+1];
        arr[row] = arr[row] || [];
        arr[row][col] = arr[row][col] || '';
        if (cc === '"' && quote && nc === '"') { arr[row][col] += cc; ++c; continue; }
        if (cc === '"') { quote = !quote; continue; }
        if (cc === ',' && !quote) { ++col; continue; }
        if (cc === '\r' && nc === '\n' && !quote) { ++row; col = 0; ++c; continue; }
        if (cc === '\n' && !quote) { ++row; col = 0; continue; }
        if (cc === '\r' && !quote) { ++row; col = 0; continue; }
        arr[row][col] += cc;
      }
      return arr;
    }

    // --- PRODUCT IMAGE RENDERING COMPONENT ---
    function ProductImage({ code, baseImageUrl, githubBranch, githubSubfolder, fallbackImage, className }) {
      const extensions = ['.jpg', '.png', '.jpeg', '.JPG', '.PNG', '.JPEG'];
      const [extIndex, setExtIndex] = useState(0);
      const [failed, setFailed] = useState(false);

      useEffect(() => {
        setExtIndex(0);
        setFailed(false);
      }, [code, baseImageUrl, githubBranch, githubSubfolder]);

      const getSrc = () => {
        if (fallbackImage && fallbackImage.trim() !== '') return fallbackImage.trim();
        if (!baseImageUrl) return '';
        
        let cleanBase = baseImageUrl.trim();
        if (cleanBase.includes('github.com') && !cleanBase.includes('raw.githubusercontent.com')) {
          cleanBase = cleanBase.replace(/\.git$/, '');
          try {
            const urlObj = new URL(cleanBase);
            const pathParts = urlObj.pathname.split('/').filter(Boolean);
            if (pathParts.length >= 2) {
              const user = pathParts[0];
              const repo = pathParts[1];
              const branch = githubBranch.trim() || 'main';
              const subfolder = githubSubfolder && githubSubfolder.trim() ? '/' + githubSubfolder.trim().replace(/^\/|\/$/g, '') : '';
              cleanBase = `https://raw.githubusercontent.com/${user}/${repo}/${branch}${subfolder}`;
            }
          } catch (e) {
            console.error("URL parsing error", e);
          }
        } else {
          cleanBase = cleanBase.replace(/\/$/, '');
        }
        return `${cleanBase}/${code}${extensions[extIndex]}`;
      };

      const handleImageError = () => {
        if (extIndex < extensions.length - 1) {
          setExtIndex(prev => prev + 1);
        } else {
          setFailed(true);
        }
      };

      const src = getSrc();

      if (failed || !src) {
        return (
          <div className="absolute inset-0 flex flex-col items-center justify-center text-gray-400 bg-gray-50 z-0">
            <ImageIcon className="w-8 h-8 mb-1" />
            <span className="text-[10px]">No Image</span>
          </div>
        );
      }

      return (
        <img 
          src={src} 
          alt={code} 
          className={className}
          onError={handleImageError}
        />
      );
    }

    // --- MAIN REACT COMPONENT ---
    function App() {
      const [user, setUser] = useState(null);
      const fileInputRef = useRef(null);
      
      const [viewMode, setViewMode] = useState('browse'); 
      const [adminTab, setAdminTab] = useState('selections'); 
      
      const [catalogs, setCatalogs] = useState(DEFAULT_CATALOGS); 
      const [selectedCodes, setSelectedCodes] = useState(new Set());
      const [adminSelections, setAdminSelections] = useState([]);
      
      const [baseImageUrl, setBaseImageUrl] = useState(''); 
      const [githubBranch, setGithubBranch] = useState('main'); 
      const [githubSubfolder, setGithubSubfolder] = useState(''); 
      
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [isSavingUrl, setIsSavingUrl] = useState(false);
      const [showSuccess, setShowSuccess] = useState(false);
      const [uploadFileName, setUploadFileName] = useState('');
      const [jsonError, setJsonError] = useState('');
      const [previewData, setPreviewData] = useState(null); 

      const [aiInsights, setAiInsights] = useState('');
      const [isGeneratingInsights, setIsGeneratingInsights] = useState(false);

      const getExampleUrl = () => {
        let cleanBase = baseImageUrl.trim();
        if (cleanBase.includes('github.com') && !cleanBase.includes('raw.githubusercontent.com')) {
          cleanBase = cleanBase.replace(/\.git$/, '');
          try {
            const urlObj = new URL(cleanBase);
            const pathParts = urlObj.pathname.split('/').filter(Boolean);
            if (pathParts.length >= 2) {
              const user = pathParts[0];
              const repo = pathParts[1];
              const branch = githubBranch.trim() || 'main';
              const subfolder = githubSubfolder && githubSubfolder.trim() ? '/' + githubSubfolder.trim().replace(/^\/|\/$/g, '') : '';
              cleanBase = `https://raw.githubusercontent.com/${user}/${repo}/${branch}${subfolder}`;
            }
          } catch (e) {
            console.error(e);
          }
        }
        return `${cleanBase}/0102042321306.jpg`;
      };

      // Handle Authentication
      useEffect(() => {
        if (!isFirebaseActive) {
          setUser({ uid: 'local-demo-user' });
          return;
        }
        auth.signInAnonymously().catch(error => {
          console.error("Anonymous authentication failed", error);
        });
        const unsubscribe = auth.onAuthStateChanged(setUser);
        return () => unsubscribe();
      }, []);

      // Fetch Live Database Updates
      useEffect(() => {
        if (!user || !isFirebaseActive) return;

        const unsubCatalog = db.collection('artifacts').doc(appId).collection('public').doc('catalog')
          .onSnapshot((docSnap) => {
            if (docSnap.exists) {
              const data = docSnap.data();
              if (data.files) setCatalogs(data.files);
              if (data.baseImageUrl !== undefined) setBaseImageUrl(data.baseImageUrl);
              if (data.githubBranch !== undefined) setGithubBranch(data.githubBranch);
              if (data.githubSubfolder !== undefined) setGithubSubfolder(data.githubSubfolder);
            }
          }, (error) => console.error("Catalog download error:", error));

        const unsubSelections = db.collection('artifacts').doc(appId).collection('public').doc('md_selections')
          .onSnapshot((docSnap) => {
            if (docSnap.exists) {
              setAdminSelections(docSnap.data().selectedCodes || []);
            } else {
              setAdminSelections([]);
            }
          }, (error) => console.error("Selection load error:", error));

        return () => {
          unsubCatalog();
          unsubSelections();
        };
      }, [user]);

      const toggleSelection = (code) => {
        if (viewMode === 'admin') return; 
        setSelectedCodes(prev => {
          const newSet = new Set(prev);
          if (newSet.has(code)) newSet.delete(code);
          else newSet.add(code);
          return newSet;
        });
      };

      const submitSelection = async () => {
        setIsSubmitting(true);
        if (isFirebaseActive && user) {
          try {
            await db.collection('artifacts').doc(appId).collection('public').doc('md_selections').set({
              selectedCodes: Array.from(selectedCodes),
              updatedAt: new Date().toISOString(),
              submittedBy: user.uid
            });
          } catch (error) {
            console.error("Error committing to live database:", error);
          }
        } else {
          await new Promise(resolve => setTimeout(resolve, 800));
          setAdminSelections(Array.from(selectedCodes));
        }
        setIsSubmitting(false);
        setShowSuccess(true);
        setTimeout(() => setShowSuccess(false), 5000);
      };

      const sendWhatsAppNotification = () => {
        const text = `Hi, I have finalized the stock selection on the KF Style Board.\n\nTotal Approved Styles: ${selectedCodes.size}\nCodes: ${Array.from(selectedCodes).join(', ')}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
      };

      const saveBaseImageUrl = async () => {
        setIsSavingUrl(true);
        try {
          let finalUrl = baseImageUrl.trim();
          if (isFirebaseActive && user) {
            await db.collection('artifacts').doc(appId).collection('public').doc('catalog').set({ 
              baseImageUrl: finalUrl, 
              githubBranch: githubBranch.trim(),
              githubSubfolder: githubSubfolder.trim(),
              updatedAt: new Date().toISOString() 
            }, { merge: true });
          } else {
            setBaseImageUrl(finalUrl);
          }
          setShowSuccess(true);
          setTimeout(() => setShowSuccess(false), 3000);
        } catch (error) {
          setJsonError("Failed to save Image settings.");
        } finally {
          setIsSavingUrl(false);
        }
      };

      const handleFileUpload = (e) => {
        if (!uploadFileName.trim()) {
          setJsonError("Please enter a 'File Name' (e.g., KF 80Days) before selecting a file.");
          if (fileInputRef.current) fileInputRef.current.value = '';
          return;
        }

        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          const text = event.target.result;
          try {
            const rows = parseCSV(text);
            if (rows.length < 2) throw new Error("CSV is empty or missing data rows.");

            const headers = rows[0].map(h => h.trim().toLowerCase());
            const getIdx = (keywords) => headers.findIndex(h => keywords.some(k => h.includes(k)));

            const idxCode = getIdx(['product code', 'code']);
            const idxImage = getIdx(['product image', 'image', 'url']);
            const idxName = getIdx(['product name', 'name', 'title']);
            const idxCat = getIdx(['category', 'sub category']);
            const idxPrice = getIdx(['sellingprice', 'price', 'selling price']);
            const idxQty = getIdx(['qty', 'quantity', 'stock']);

            if (idxCode === -1) throw new Error("Could not find a 'Product Code' column in the uploaded CSV.");

            const parsedItems = [];
            for (let i = 1; i < rows.length; i++) {
              const row = rows[i];
              if (row.length === 1 && !row[0]) continue; 
              if (!row[idxCode]) continue; 

              parsedItems.push({
                code: row[idxCode]?.trim() || "",
                image: idxImage !== -1 ? row[idxImage]?.trim() || "" : "",
                name: idxName !== -1 ? row[idxName]?.trim() || "" : "",
                category: idxCat !== -1 ? row[idxCat]?.trim() || "" : "",
                price: idxPrice !== -1 ? row[idxPrice]?.trim() || "" : "",
                qty: idxQty !== -1 ? row[idxQty]?.trim() || "" : ""
              });
            }

            setPreviewData(parsedItems);
            setJsonError('');
            if (fileInputRef.current) fileInputRef.current.value = '';
          } catch (err) {
            setJsonError(err.message || "Error parsing CSV file.");
            setPreviewData(null);
          }
        };
        reader.readAsText(file);
      };

      const saveNewCatalogFile = async () => {
        if (!previewData || !uploadFileName.trim()) return;
        setIsSubmitting(true);
        
        try {
          const newFile = {
            id: "file-" + Date.now().toString(),
            name: uploadFileName.trim(),
            items: previewData
          };
          const updatedCatalogs = [...catalogs, newFile];

          if (isFirebaseActive && user) {
            await db.collection('artifacts').doc(appId).collection('public').doc('catalog').set({
              files: updatedCatalogs,
              updatedAt: new Date().toISOString()
            }, { merge: true });
          } else {
            await new Promise(resolve => setTimeout(resolve, 500));
            setCatalogs(updatedCatalogs);
          }
          
          setShowSuccess(true);
          setPreviewData(null); 
          setUploadFileName(''); 
          setTimeout(() => setShowSuccess(false), 3000);
        } catch (error) {
          setJsonError(error.message || "Failed to save data.");
        } finally {
          setIsSubmitting(false);
        }
      };

      const deleteCatalogFile = async (fileIdToDelete) => {
        if (!window.confirm("Are you sure you want to delete this entire file?")) return;
        try {
          const updatedCatalogs = catalogs.filter(c => c.id !== fileIdToDelete);
          if (isFirebaseActive && user) {
            await db.collection('artifacts').doc(appId).collection('public').doc('catalog').set({
              files: updatedCatalogs,
              updatedAt: new Date().toISOString()
            }, { merge: true });
          } else {
            setCatalogs(updatedCatalogs);
          }
        } catch (error) {
          console.error("Error deleting catalog file:", error);
        }
      };

      const downloadSelectionsCSV = (file) => {
        const selectedItems = file.items.filter(item => adminSelections.includes(item.code));
        if (selectedItems.length === 0) return;

        const headers = ['Product Code', 'Product Image (URL)', 'Product Name', 'Category', 'SellingPrice', 'Qty'];
        
        const rows = selectedItems.map(item => {
          let cleanBase = baseImageUrl.trim().replace(/\.git$/, '').replace(/\/$/, '');
          const finalImageUrl = `${cleanBase}/${item.code}.jpg`; 
          return [
            `"${item.code}"`,
            `"${finalImageUrl}"`,
            `"${item.name || ''}"`,
            `"${item.category || ''}"`,
            `"${item.price || ''}"`,
            `"${item.qty || ''}"`
          ];
        });

        const csvContent = [headers.join(','), ...rows.map(row => row.join(','))].join('\n');
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.setAttribute('href', url);
        const safeFileName = file.name.replace(/[^a-z0-9]/gi, '_').toLowerCase();
        link.setAttribute('download', `KF_Approved_${safeFileName}_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const handleGenerateInsights = async () => {
        const allSelectedItems = catalogs.flatMap(file => 
          file.items.filter(item => adminSelections.includes(item.code))
        );
        if (allSelectedItems.length === 0) return;
        setIsGeneratingInsights(true);
        setAiInsights('');
        const itemsList = allSelectedItems.map(i => `- ${i.name} (${i.category}) - Rs. ${i.price}`).join("\n");
        const prompt = `Here is a list of Kelly Felder clothing items the Managing Director just approved for our new drop:\n\n${itemsList}\n\nPlease provide marketing vibe analysis and captions.`;
        const result = await callGeminiAPI(prompt, "Fashion Marketer copywriter context");
        setAiInsights(result);
        setIsGeneratingInsights(false);
      };

      const isSelected = (code) => viewMode !== 'admin' ? selectedCodes.has(code) : adminSelections.includes(code);

      const renderProductGrid = (itemsToRender, emptyMessage) => {
        if (itemsToRender.length === 0) {
          return (
            <div className="text-center py-8 px-4 bg-white rounded-xl border border-dashed border-gray-300">
              <p className="text-gray-500 text-sm">{emptyMessage || "No items to display"}</p>
            </div>
          );
        }

        return (
          <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-4">
            {itemsToRender.map((product) => {
              const selected = isSelected(product.code);
              return (
                <div 
                  key={product.code}
                  onClick={() => toggleSelection(product.code)}
                  className={`
                    relative bg-white rounded-2xl overflow-hidden transition-all duration-200
                    ${viewMode !== 'admin' ? 'cursor-pointer active:scale-95' : 'cursor-default'}
                    ${selected ? 'ring-4 ring-black shadow-md transform -translate-y-1' : 'border border-gray-200 shadow-sm hover:shadow-md'}
                  `}
                >
                  {selected && (
                    <div className="absolute top-2 right-2 z-20 bg-black rounded-full p-0.5 shadow-sm">
                      <CheckCircle className="w-5 h-5 text-white" />
                    </div>
                  )}

                  <div className="aspect-[3/4] bg-gray-50 flex flex-col items-center justify-center text-center relative overflow-hidden group">
                    <ProductImage 
                      code={product.code}
                      baseImageUrl={baseImageUrl}
                      githubBranch={githubBranch}
                      githubSubfolder={githubSubfolder}
                      fallbackImage={product.image}
                      className={`absolute inset-0 w-full h-full object-cover transition-transform duration-500 ${viewMode !== 'admin' ? 'group-hover:scale-105' : ''}`}
                    />
                    
                    <div className="absolute bottom-2 left-1/2 -translate-x-1/2 z-10 w-11/12 text-center">
                      <span className="text-[10px] font-mono font-bold text-gray-800 bg-white/95 backdrop-blur-sm px-2 py-1 rounded shadow-sm inline-block max-w-full truncate">
                        {product.code}
                      </span>
                    </div>
                  </div>

                  <div className="p-3 bg-white">
                    <p className="text-[10px] text-gray-500 mb-1 font-bold uppercase tracking-wider truncate">{product.category || 'CATEGORY'}</p>
                    <h3 className="text-sm font-bold text-gray-900 leading-tight mb-3 line-clamp-2" title={product.name}>{product.name}</h3>
                    
                    <div className="flex items-end justify-between mt-auto">
                      <div>
                        <p className="text-[10px] text-gray-400 uppercase tracking-wide">Price</p>
                        <p className="text-sm font-bold text-gray-900">Rs. {product.price}</p>
                      </div>
                      <div className="text-right">
                        <p className="text-[10px] text-gray-400 uppercase tracking-wide">Stock</p>
                        <p className="text-xs font-semibold text-gray-700">{product.qty}</p>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-gray-50 font-sans pb-32">
          <header className="bg-white shadow-sm sticky top-0 z-30">
            <div className="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <div className="bg-black text-white p-1.5 rounded-md">
                  <LayoutGrid className="w-5 h-5" />
                </div>
                <h1 className="font-extrabold text-gray-900 text-lg tracking-tight hidden sm:block font-mono">KF Style Board</h1>
                <h1 className="font-extrabold text-gray-900 text-lg tracking-tight sm:hidden font-mono">KF</h1>
              </div>
              
              <div className="flex bg-gray-100 p-1 rounded-lg">
                <button onClick={() => setViewMode('browse')} className={`px-3 py-1.5 text-xs sm:text-sm font-bold rounded-md transition-all flex items-center gap-1.5 ${viewMode === 'browse' ? 'bg-white shadow-sm text-black' : 'text-gray-500'}`}>
                  <LayoutGrid className="w-4 h-4" /> <span className="hidden sm:inline">Browse</span>
                </button>
                <button onClick={() => setViewMode('review')} className={`px-3 py-1.5 text-xs sm:text-sm font-bold rounded-md transition-all flex items-center gap-1.5 ${viewMode === 'review' ? 'bg-white shadow-sm text-black' : 'text-gray-500'}`}>
                  <CheckCircle className="w-4 h-4" /> 
                  <span className="hidden sm:inline">Review</span>
                  {selectedCodes.size > 0 && <span className="bg-black text-white text-[10px] px-1.5 py-0.5 rounded-full ml-1">{selectedCodes.size}</span>}
                </button>
                <button onClick={() => setViewMode('admin')} className={`px-3 py-1.5 text-xs sm:text-sm font-bold rounded-md transition-all flex items-center gap-1.5 ${viewMode === 'admin' ? 'bg-white shadow-sm text-purple-600' : 'text-gray-500'}`}>
                  <Shield className="w-4 h-4" /> Admin
                </button>
              </div>
            </div>
            
            {viewMode === 'admin' && (
              <div className="bg-purple-50 border-b border-purple-100 px-4 py-2 flex justify-center gap-4">
                <button onClick={() => setAdminTab('selections')} className={`text-sm font-semibold px-4 py-1.5 rounded-full transition-all ${adminTab === 'selections' ? 'bg-purple-600 text-white shadow-sm' : 'text-purple-600 hover:bg-purple-100'}`}>
                  MD Final Select
                </button>
                <button onClick={() => setAdminTab('catalog')} className={`text-sm font-semibold px-4 py-1.5 rounded-full transition-all ${adminTab === 'catalog' ? 'bg-purple-600 text-white shadow-sm' : 'text-purple-600 hover:bg-purple-100'}`}>
                  Manage Catalog Files
                </button>
              </div>
            )}
          </header>

          <main className="max-w-5xl mx-auto p-4">
            {viewMode === 'browse' && (
              <>
                <div className="mb-6 bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4">
                  <div>
                    <h2 className="text-xl font-bold text-gray-900">Suggested Styles</h2>
                    <p className="text-gray-500 text-sm">Select the items you want to approve for the upcoming drop.</p>
                  </div>
                  <div className="bg-gray-100 px-3 py-2 rounded-lg flex items-center gap-2 max-w-sm">
                    <FileText className="w-4 h-4 text-gray-500 flex-shrink-0" />
                    <p className="text-xs text-gray-700 font-medium truncate">
                      Selected files: {catalogs.length > 0 ? catalogs.map(c => c.name).join(' / ') : 'None'}
                    </p>
                  </div>
                </div>
                {catalogs.map(file => (
                  <div key={file.id} className="mb-10">
                    <div className="flex items-center gap-2 mb-4">
                      <h3 className="text-lg font-black text-gray-800 uppercase tracking-tight">{file.name}</h3>
                      <span className="text-[10px] bg-gray-200 text-gray-600 px-2 py-0.5 rounded-full font-bold">{file.items.length} styles</span>
                    </div>
                    {renderProductGrid(file.items, `No items found in ${file.name}`)}
                  </div>
                ))}
              </>
            )}

            {viewMode === 'review' && (
              <div className="animate-in fade-in duration-300">
                <div className="mb-6">
                  <h2 className="text-xl font-bold text-gray-900">Your Selection</h2>
                  <p className="text-gray-500 text-sm">Review your chosen styles before confirming.</p>
                </div>
                {catalogs.map(file => {
                  const selectedInThisFile = file.items.filter(item => selectedCodes.has(item.code));
                  if (selectedInThisFile.length === 0) return null;
                  return (
                    <div key={file.id} className="mb-10">
                      <div className="flex items-center gap-2 mb-4 border-b border-gray-200 pb-2">
                        <h3 className="text-md font-bold text-gray-700">{file.name}</h3>
                        <span className="text-[10px] bg-black text-white px-2 py-0.5 rounded-full font-bold">{selectedInThisFile.length} selected</span>
                      </div>
                      {renderProductGrid(selectedInThisFile, '')}
                    </div>
                  );
                })}
              </div>
            )}

            {viewMode === 'admin' && (
              <div className="animate-in fade-in slide-in-from-bottom-2 duration-300">
                {adminTab === 'selections' && (
                  <>
                    <div className="bg-purple-50 border border-purple-100 rounded-xl p-4 mb-6 shadow-sm">
                      <div className="flex items-start gap-3 mb-4">
                        <Shield className="w-5 h-5 text-purple-600 mt-0.5" />
                        <div>
                          <h3 className="font-semibold text-purple-900 text-sm">MD's Live Selection Dashboard</h3>
                          <p className="text-purple-700 text-xs mt-1">Total Approved Across All Files: <strong>{adminSelections.length}</strong> styles.</p>
                        </div>
                      </div>
                      {adminSelections.length > 0 && (
                        <div className="flex flex-wrap items-center gap-3 pt-3 border-t border-purple-200">
                          <button onClick={handleGenerateInsights} disabled={isGeneratingInsights} className="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center justify-center gap-2 hover:bg-indigo-700 shadow-sm disabled:opacity-50">
                            {isGeneratingInsights ? <Loader className="w-4 h-4" /> : <Sparkles className="w-4 h-4" />}
                            Generate AI Copy
                          </button>
                          <div className="h-6 w-px bg-purple-200 hidden sm:block font-bold"></div>
                          {catalogs.map(file => {
                            const count = file.items.filter(item => adminSelections.includes(item.code)).length;
                            if (count === 0) return null;
                            return (
                              <button key={`dl-${file.id}`} onClick={() => downloadSelectionsCSV(file)} className="bg-purple-600 text-white px-3 py-2 rounded-lg text-xs font-medium flex items-center gap-1.5 hover:bg-purple-700 shadow-sm transition-colors">
                                <Download className="w-3.5 h-3.5" /> {file.name} ({count})
                              </button>
                            );
                          })}
                        </div>
                      )}
                    </div>
                    {aiInsights && (
                      <div className="bg-indigo-50 border border-indigo-200 rounded-xl p-5 mb-6 shadow-sm animate-in fade-in duration-500">
                        <div className="text-sm text-indigo-900 whitespace-pre-wrap leading-relaxed">{aiInsights}</div>
                      </div>
                    )}
                    {catalogs.map(file => {
                      const selectedInThisFile = file.items.filter(item => adminSelections.includes(item.code));
                      if (selectedInThisFile.length === 0) return null;
                      return (
                        <div key={`admin-grid-${file.id}`} className="mb-10">
                          <div className="flex items-center gap-2 mb-4 border-b border-gray-200 pb-2">
                            <h3 className="text-md font-bold text-gray-700">{file.name}</h3>
                            <span className="text-[10px] bg-purple-100 text-purple-800 border border-purple-200 px-2 py-0.5 rounded-full font-bold">{selectedInThisFile.length} approved</span>
                          </div>
                          {renderProductGrid(selectedInThisFile, '')}
                        </div>
                      );
                    })}
                  </>
                )}

                {adminTab === 'catalog' && (
                  <div className="space-y-6">
                    {/* --- AUTOMATED GITHUB IMAGE SETTINGS --- */}
                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
                      <div className="flex items-center gap-2 text-gray-900 mb-2">
                        <LinkIcon className="w-5 h-5 text-blue-600" />
                        <h2 className="font-bold text-lg">Automated Image Folder (GitHub)</h2>
                      </div>
                      <p className="text-sm text-gray-600 mb-4">
                        The app automatically transforms your standard GitHub repository URL into raw image links!
                      </p>
                      
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                        <div className="md:col-span-2">
                          <label className="block text-xs font-bold text-gray-700 mb-1">GitHub Repo URL</label>
                          <input 
                            type="text" 
                            value={baseImageUrl}
                            onChange={(e) => setBaseImageUrl(e.target.value)}
                            placeholder="e.g., https://github.com/jkdtharindu/KF-Stock-Images.git"
                            className="w-full p-2.5 text-sm rounded-lg border border-gray-300 outline-none focus:ring-2 focus:ring-blue-500 font-mono text-xs"
                          />
                        </div>
                        <div>
                          <label className="block text-xs font-bold text-gray-700 mb-1">Branch (Normally 'main')</label>
                          <input 
                            type="text" 
                            value={githubBranch}
                            onChange={(e) => setGithubBranch(e.target.value)}
                            placeholder="main"
                            className="w-full p-2.5 text-sm rounded-lg border border-gray-300 outline-none focus:ring-2 focus:ring-blue-500"
                          />
                        </div>
                        <div className="md:col-span-3">
                          <label className="block text-xs font-bold text-gray-700 mb-1">Subfolder in Repo (Optional)</label>
                          <input 
                            type="text" 
                            value={githubSubfolder}
                            onChange={(e) => setGithubSubfolder(e.target.value)}
                            placeholder="e.g., images (leave blank if files are at root of the repository)"
                            className="w-full p-2.5 text-sm rounded-lg border border-gray-300 outline-none focus:ring-2 focus:ring-blue-500"
                          />
                        </div>
                      </div>

                      <div className="flex justify-end gap-3 mt-4">
                        <button 
                          onClick={saveBaseImageUrl}
                          disabled={isSavingUrl}
                          className="bg-blue-600 text-white px-6 py-2.5 rounded-lg font-semibold hover:bg-blue-700 transition-colors flex items-center justify-center gap-2 whitespace-nowrap"
                        >
                          {isSavingUrl ? <Loader className="w-4 h-4" /> : <Save className="w-4 h-4" />}
                          Save Settings
                        </button>
                      </div>

                      {/* Smart Debugging Preview Box */}
                      {baseImageUrl && (
                        <div className="mt-4 p-4 bg-gray-50 border border-gray-200 rounded-lg animate-in fade-in duration-300">
                          <h4 className="text-xs font-bold text-gray-700 mb-1 uppercase tracking-wider">Live URL Generator Tester</h4>
                          <p className="text-xs text-gray-500 mb-3">
                            The board uses an automatic multi-extension fallback system to fetch your images. It generates paths starting with the following raw address to load product code <strong>0102042321306</strong>:
                          </p>
                          <div className="p-2.5 bg-white border border-gray-300 rounded font-mono text-xs text-blue-600 truncate flex items-center justify-between">
                            <span className="truncate select-all">{getExampleUrl()}</span>
                            <a 
                              href={getExampleUrl()} 
                              target="_blank" 
                              rel="noreferrer" 
                              className="text-[10px] bg-blue-100 hover:bg-blue-200 text-blue-800 px-2 py-1 rounded font-bold ml-2 shrink-0 transition-colors"
                            >
                              Test Link
                            </a>
                          </div>
                        </div>
                      )}
                    </div>

                    {/* List of currently uploaded files */}
                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
                      <div className="flex items-center gap-2 text-gray-900 mb-4">
                        <Database className="w-5 h-5 text-purple-600" />
                        <h2 className="font-bold text-lg">Currently Uploaded Files</h2>
                      </div>
                      {catalogs.length === 0 ? (
                        <p className="text-sm text-gray-500 italic">No files uploaded yet.</p>
                      ) : (
                        <div className="space-y-3">
                          {catalogs.map((file) => (
                            <div key={file.id} className="flex items-center justify-between bg-gray-50 border border-gray-200 p-3 rounded-lg animate-in fade-in">
                              <div>
                                <p className="font-bold text-gray-800 flex items-center gap-2">
                                  <FileText className="w-4 h-4 text-gray-400" /> {file.name}
                                </p>
                                <p className="text-xs text-gray-500 mt-0.5 ml-6">{file.items.length} styles inside</p>
                              </div>
                              <button onClick={() => deleteCatalogFile(file.id)} className="text-red-500 hover:bg-red-50 p-2 rounded-md transition-colors" title="Delete file">
                                <Trash2 className="w-4 h-4" />
                              </button>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>

                    {/* File Upload Zone */}
                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
                      <div className="flex items-center gap-2 text-gray-900 mb-4">
                        <Plus className="w-5 h-5 text-purple-600" />
                        <h2 className="font-bold text-lg">Upload New File</h2>
                      </div>

                      {!previewData ? (
                        <div className="bg-purple-50 border border-purple-200 rounded-xl p-5">
                          <div className="mb-4">
                            <label className="block text-sm font-bold text-purple-900 mb-1">1. Enter File Name</label>
                            <input type="text" value={uploadFileName} onChange={(e) => setUploadFileName(e.target.value)} placeholder="e.g., KF 80Days" className="w-full md:w-1/2 p-2.5 rounded-lg border border-purple-200 outline-none focus:ring-2 focus:ring-purple-500"/>
                          </div>
                          <div className="mb-2">
                            <label className="block text-sm font-bold text-purple-900 mb-1">2. Upload CSV File</label>
                            <div className="border-2 border-dashed border-purple-300 bg-white rounded-xl p-6 text-center hover:bg-purple-100 transition-colors">
                              <input type="file" accept=".csv" className="hidden" id="csv-upload" ref={fileInputRef} onChange={handleFileUpload} />
                              <label htmlFor="csv-upload" className="cursor-pointer flex flex-col items-center">
                                <div className="bg-purple-100 p-3 rounded-full mb-3"><FileSpreadsheet className="w-6 h-6 text-purple-600" /></div>
                                <span className="font-bold text-purple-900">Click to Select CSV File</span>
                                <span className="text-xs text-purple-600 mt-1 max-w-sm">Saved as "CSV (Comma delimited)" from Excel.</span>
                              </label>
                            </div>
                          </div>
                          {jsonError && (
                            <div className="mt-3 text-red-600 text-sm flex items-center gap-2 bg-red-50 p-2 rounded-md">
                              <AlertCircle className="w-4 h-4" /> {jsonError}
                            </div>
                          )}
                        </div>
                      ) : (
                        <div className="animate-in fade-in duration-500 bg-white border border-green-200 rounded-xl p-5">
                          <div className="flex flex-col md:flex-row items-start md:items-center justify-between mb-4 gap-4">
                            <div>
                              <div className="flex items-center gap-2 text-green-700">
                                <SearchCheck className="w-5 h-5" />
                                <h3 className="font-bold text-lg">Previewing: {uploadFileName}</h3>
                              </div>
                              <p className="text-xs text-gray-500 mt-1">
                                {previewData.length} items loaded. If you set up an Automated Image Folder, they will link automatically below.
                              </p>
                            </div>
                            
                            <div className="flex items-center gap-2 w-full md:w-auto">
                              <button onClick={() => { setPreviewData(null); setUploadFileName(''); }} className="flex-1 bg-gray-200 text-gray-700 px-4 py-2 rounded-lg font-medium hover:bg-gray-300 transition-colors">Cancel</button>
                              <button onClick={saveNewCatalogFile} disabled={isSubmitting} className="flex-1 bg-green-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-green-700 flex items-center justify-center gap-2 transition-colors">
                                {isSubmitting ? <Loader className="w-4 h-4" /> : <Save className="w-4 h-4" />} Save & Add File
                              </button>
                            </div>
                          </div>
                          
                          <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 max-h-[500px] overflow-y-auto p-1 bg-gray-50 rounded-lg border border-gray-200">
                            {previewData.map((item, idx) => {
                              return (
                                <div key={idx} className="border border-gray-200 rounded-lg p-2 bg-white shadow-sm flex flex-col items-center group">
                                  <div className="w-full aspect-[3/4] bg-gray-50 rounded-md overflow-hidden mb-2 relative">
                                    <ProductImage 
                                      code={item.code}
                                      baseImageUrl={baseImageUrl}
                                      githubBranch={githubBranch}
                                      githubSubfolder={githubSubfolder}
                                      fallbackImage={item.image}
                                      className="w-full h-full object-cover"
                                    />
                                  </div>
                                  <span className="text-[10px] font-mono font-bold text-gray-800 bg-gray-100 px-1.5 py-0.5 rounded truncate w-full text-center" title={item.code}>{item.code || 'NO CODE'}</span>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      )}
                      {showSuccess && !isSavingUrl && (
                        <div className="mt-4 text-green-600 text-sm flex items-center gap-2 font-medium bg-green-50 p-3 rounded-lg border border-green-200 animate-in fade-in">
                          <CheckCircle className="w-5 h-5" /> Saved successfully!
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>
            )}
          </main>

          {/* Floating Action Bars */}
          {viewMode === 'browse' && selectedCodes.size > 0 && (
            <div className="fixed bottom-0 left-0 right-0 p-4 z-40 animate-in slide-in-from-bottom-full duration-300">
              <div className="max-w-md mx-auto">
                <button onClick={() => setViewMode('review')} className="w-full bg-black text-white px-6 py-4 rounded-2xl font-bold flex items-center justify-between shadow-xl shadow-gray-300 hover:scale-[1.02] transition-transform">
                  <div className="flex items-center gap-3">
                    <div className="bg-white text-black px-2 py-1 rounded-md text-xs">{selectedCodes.size}</div>
                    <span>Review Selection</span>
                  </div>
                  <ArrowRight className="w-5 h-5" />
                </button>
              </div>
            </div>
          )}

          {viewMode === 'review' && (
            <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-40 animate-in slide-in-from-bottom-full duration-300">
              <div className="max-w-5xl mx-auto">
                {showSuccess && (
                  <div className="bg-green-50 border border-green-200 rounded-xl p-4 mb-4 flex flex-col sm:flex-row sm:items-center justify-between gap-3 animate-in slide-in-from-bottom-2">
                    <div className="flex items-center gap-2 text-green-700 font-medium text-sm">
                      <CheckCircle className="w-5 h-5" /> Selection saved successfully!
                    </div>
                    <button onClick={sendWhatsAppNotification} className="bg-[#25D366] text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center justify-center gap-2 hover:bg-[#1ebd5a] transition-colors shadow-sm">
                      <Send className="w-4 h-4" /> Notify Admin via WhatsApp
                    </button>
                  </div>
                )}
                <div className="flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="w-full sm:w-auto flex items-center justify-between sm:justify-start gap-4">
                    <p className="text-sm text-gray-500 font-medium">Final Styles</p>
                    <p className="text-2xl font-black text-gray-900">{selectedCodes.size}</p>
                  </div>
                  <button onClick={submitSelection} disabled={selectedCodes.size === 0 || isSubmitting} className={`w-full sm:w-auto px-8 py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 transition-all ${selectedCodes.size > 0 && !isSubmitting ? 'bg-black text-white shadow-lg hover:bg-gray-800 active:scale-95' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>
                    {isSubmitting ? <><Loader className="w-5 h-5" /> Saving...</> : <><CheckCircle className="w-5 h-5" /> Confirm & Submit</>}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
